<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Places4Lease — Rentals across Liberia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --ink:#1C2E29; --paper:#F1ECE3; --surface:#FFFFFF;
  --brass:#B8862E; --brass-dark:#8F6A22;
  --whatsapp:#25D366; --whatsapp-dark:#1DA851;
  --border:#E3DCD1; --muted:#7A7167;
  --radius:16px; --shadow:0 2px 10px rgba(28,46,41,.08);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
h1,h2,h3{margin:0;letter-spacing:-0.02em;}
a{text-decoration:none;color:inherit;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:78px;}
.hidden{display:none !important;}
#loadingOverlay{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:200;font-weight:700;color:var(--muted);}


.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px;}
.brand{font-weight:800;font-size:19px;letter-spacing:-0.03em;display:flex;align-items:center;gap:6px;}
.brand span b{color:var(--brass-dark);}
.icon-btn{font-size:19px;padding:6px;border-radius:50%;}
.icon-btn:hover{background:rgba(0,0,0,.04);}
.desktop-nav{display:none;}

.search-row{padding:0 18px 10px;}
.search-row input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface);font-size:15px;outline:none;}
.search-row input:focus{border-color:var(--brass);}
.price-row{display:flex;gap:8px;margin-top:8px;}
.price-row input{padding:9px 10px;font-size:13.5px;}

.chip-row{display:flex;gap:8px;padding:2px 18px 12px;overflow-x:auto;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:7px 16px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap;}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.view-controls{display:flex;align-items:center;justify-content:space-between;padding:0 18px 14px;gap:10px;}
.seg-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:3px;}
.seg{padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--muted);}
.seg.active{background:var(--brass);color:#fff;}
#sortSelect{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:7px 8px;font-size:13px;color:var(--ink);}

.view{display:none;padding:0 18px 18px;}
.view.active{display:block;}
.section-title{font-size:20px;font-weight:800;margin:8px 0 14px;}
.grid{display:grid;grid-template-columns:1fr;gap:14px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .big{font-size:38px;margin-bottom:8px;}

.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;border:1px solid var(--border);}
.card-photo{height:150px;display:flex;align-items:center;justify-content:center;position:relative;color:#fff;overflow:hidden;}
.card-photo img{width:100%;height:100%;object-fit:cover;}
.card-icon{width:54px;height:54px;opacity:.95;}
.photo-badge{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600;}
.plate-tag{position:absolute;top:10px;left:10px;background:var(--brass);color:#fff;font-weight:800;font-size:11.5px;padding:5px 10px;border-radius:6px;letter-spacing:.02em;box-shadow:0 2px 4px rgba(0,0,0,.2);transform:rotate(-2deg);}
.key-save{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;transition:transform .25s;}
.key-save.saved{color:var(--brass-dark);transform:rotate(75deg);}
.card-body{padding:12px 14px 14px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:2px;}
.card-loc{font-size:13px;color:var(--muted);margin-bottom:8px;}
.card-price{font-size:15.5px;font-weight:800;color:var(--brass-dark);}
.card-price span{font-size:12px;font-weight:600;color:var(--muted);}
.verified-badge{background:#E4F4EA;color:#1F8A4C;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;margin-left:4px;white-space:nowrap;}
.featured-badge{background:#FBF3E4;color:var(--brass-dark);font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;margin-left:4px;white-space:nowrap;}

.map-view{height:60vh;border-radius:var(--radius);overflow:hidden;position:relative;border:1px solid var(--border);}
.map-no-listings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--muted);font-size:14px;font-weight:600;z-index:400;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 4px 10px;z-index:30;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:18px;color:var(--muted);padding:4px 8px;border-radius:10px;}
.nav-item span{font-size:10px;font-weight:700;}
.nav-item.active{color:var(--brass-dark);}
.nav-post{background:var(--brass);color:#fff;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-22px;box-shadow:0 3px 8px rgba(184,134,46,.45);}

.modal-overlay{position:fixed;inset:0;background:rgba(20,28,25,.5);display:flex;align-items:flex-end;justify-content:center;z-index:5000;}
.modal-sheet{background:var(--surface);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-radius:24px 24px 0 0;padding:18px 20px 28px;position:relative;}
.modal-close{position:absolute;top:14px;right:16px;font-size:20px;background:rgba(0,0,0,.06);width:32px;height:32px;border-radius:50%;z-index:2;}

.detail-photo{height:210px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;margin-top:6px;position:relative;overflow:hidden;}
.detail-photo img{width:100%;height:100%;object-fit:cover;}
.detail-icon{width:78px;height:78px;}
.dots{display:flex;justify-content:center;gap:6px;margin:8px 0 4px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.dot.on{background:var(--brass);}
.detail-plate{display:inline-block;background:var(--brass);color:#fff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:6px;margin:10px 0 8px;}
.detail-type{display:inline-block;background:var(--paper);border:1px solid var(--border);font-weight:700;font-size:11px;padding:4px 9px;border-radius:6px;margin-left:6px;color:var(--muted);}
.detail-title{font-size:19px;font-weight:800;margin-bottom:2px;}
.detail-loc{color:var(--muted);font-size:13.5px;margin-bottom:10px;}
.detail-price{font-size:21px;font-weight:800;color:var(--brass-dark);margin-bottom:14px;}
.amenity-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.amenity-pill{background:var(--paper);border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;}
.cta-row{display:flex;gap:10px;}
.btn{flex:1;text-align:center;padding:13px;border-radius:12px;font-weight:700;font-size:14.5px;display:block;}
.btn-whatsapp{background:var(--whatsapp);color:#fff;}
.btn-outline{border:1.5px solid var(--ink);color:var(--ink);}
.btn-brass{background:var(--brass);color:#fff;}
.btn-ghost{color:var(--muted);}

.step-indicator{font-size:15px;font-weight:800;color:var(--brass-dark);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.step-title{font-size:18px;font-weight:800;margin-bottom:14px;}
.field-label{font-size:13px;font-weight:700;color:var(--muted);margin:14px 0 6px;}
.field-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;outline:none;background:var(--surface);color:var(--ink);}
.field-input:focus{border-color:var(--brass);}
.field-hint{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4;}
.opt-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.opt-row.three{grid-template-columns:1fr 1fr 1fr;}
.opt-btn{padding:11px 6px;border:1.5px solid var(--border);border-radius:11px;font-weight:700;font-size:13px;text-align:center;}
.opt-btn.active{border-color:var(--brass);background:#FBF3E4;color:var(--brass-dark);}
.amenity-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.stepper{display:flex;align-items:center;gap:14px;margin-top:6px;}
.link-btn{color:var(--brass-dark);font-size:12.5px;font-weight:700;text-decoration:underline;background:none;border:none;cursor:pointer;}
.counter-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
.counter-grid .counter-col{padding:0;}
.counter-grid .counter-col:first-child{border-right:1px solid var(--border);padding-right:20px;}
.counter-grid .counter-col:last-child{padding-left:0;}
.stepper button{width:34px;height:34px;border:1.5px solid var(--border);border-radius:9px;font-size:17px;font-weight:700;}
.stepper .val{font-size:16px;font-weight:700;min-width:24px;text-align:center;}
.verify-box{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;}
.verify-ok{color:var(--whatsapp-dark);font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;}
.loc-box{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:10px;text-align:center;}
.summary-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;gap:10px;}
.summary-row span:first-child{color:var(--muted);flex:0 0 auto;}
.summary-row span:last-child{text-align:right;}
.step-nav{display:flex;gap:10px;margin-top:22px;}

.photo-slot-grid{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.photo-slot{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:12px;padding:9px 10px;}
.photo-slot img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex:0 0 auto;}
.ph-placeholder{width:48px;height:48px;border-radius:8px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto;}
.ph-label{flex:1;font-size:13px;font-weight:600;line-height:1.4;}
.slot-btn{font-size:11.5px;font-weight:700;color:var(--brass-dark);background:var(--paper);padding:7px 10px;border-radius:8px;flex:0 0 auto;}

.avatar-upload{display:flex;flex-direction:column;align-items:center;margin-top:10px;}
.avatar-preview{width:100px;height:100px;border-radius:50%;background:var(--paper);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;margin-bottom:12px;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;}

.disclaimer-box{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:14px;max-height:170px;overflow-y:auto;font-size:12.5px;line-height:1.55;color:#3a3a36;margin-top:10px;}
.disclaimer-box p{margin:0 0 10px;}
.agree-row{display:flex;align-items:flex-start;gap:10px;margin-top:14px;}
.agree-row input{width:19px;height:19px;margin-top:1px;flex:0 0 auto;}
.agree-row label{font-size:13px;line-height:1.5;color:#3a3a36;}

.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.dash-top{display:flex;gap:12px;align-items:center;}
.dash-thumb{width:54px;height:54px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;}
.dash-thumb svg{width:30px;height:30px;}
.dash-thumb img{width:100%;height:100%;object-fit:cover;}
.dash-info{flex:1;}
.dash-title{font-weight:700;font-size:14px;}
.status-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;display:inline-block;margin-top:3px;}
.status-badge.on{background:#E4F4EA;color:#1F8A4C;}
.status-badge.off{background:#F4E4E4;color:#A33;}
.dash-stats{font-size:11.5px;color:var(--muted);margin-top:3px;}
.dash-actions{display:flex;gap:6px;font-size:14px;}
.dash-actions button{padding:6px;border-radius:8px;background:var(--paper);}
.dash-toggle-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.dash-toggle-row span{font-size:12.5px;font-weight:600;}

.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--brass);color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13.5px;gap:10px;}
.profile-row span:first-child{color:var(--muted);}
.profile-row span:last-child{text-align:right;}
.verified-chip{background:#E4F4EA;color:#1F8A4C;font-weight:700;font-size:11px;padding:2px 8px;border-radius:999px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;}
.switch{width:42px;height:24px;border-radius:999px;background:var(--border);position:relative;flex:0 0 auto;}
.switch.on{background:var(--brass);}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;}
.switch.on::after{left:20px;}
.safety-link{font-size:13px;font-weight:700;color:var(--brass-dark);text-decoration:underline;display:inline-block;margin-top:4px;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:6000;box-shadow:0 4px 14px rgba(0,0,0,.25);max-width:90%;text-align:center;}

@media (min-width:860px){
  #app{max-width:1080px;padding-bottom:24px;}
  .bottom-nav{display:none;}
  .desktop-nav{display:flex;gap:6px;align-items:center;}
  .desktop-nav button{padding:9px 14px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--ink);}
  .desktop-nav button:hover{background:rgba(0,0,0,.04);}
  .grid{grid-template-columns:repeat(3,1fr);}
  .modal-overlay{align-items:center;}
  .modal-sheet{border-radius:20px;max-width:560px;max-height:85vh;}
}
</style>
</head>
<body>

<div id="loadingOverlay">Loading Places4Lease…</div>

<svg style="display:none" aria-hidden="true">
  <symbol id="ic-house" viewBox="0 0 100 100">
    <path d="M10 55 L50 18 L90 55 V90 H10 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <rect x="42" y="65" width="16" height="25" fill="none" stroke="white" stroke-width="5"/>
    <rect x="20" y="60" width="14" height="14" fill="none" stroke="white" stroke-width="5"/>
    <rect x="66" y="60" width="14" height="14" fill="none" stroke="white" stroke-width="5"/>
  </symbol>
  <symbol id="ic-apt" viewBox="0 0 100 100">
    <rect x="22" y="12" width="56" height="78" fill="none" stroke="white" stroke-width="6"/>
    <rect x="32" y="24" width="12" height="12" fill="white"/>
    <rect x="56" y="24" width="12" height="12" fill="white"/>
    <rect x="32" y="44" width="12" height="12" fill="white"/>
    <rect x="56" y="44" width="12" height="12" fill="white"/>
    <rect x="32" y="64" width="12" height="12" fill="white"/>
    <rect x="56" y="64" width="12" height="12" fill="white"/>
  </symbol>
  <symbol id="ic-office" viewBox="0 0 100 100">
    <rect x="15" y="15" width="70" height="75" fill="none" stroke="white" stroke-width="6"/>
    <line x1="15" y1="36" x2="85" y2="36" stroke="white" stroke-width="4"/>
    <line x1="15" y1="57" x2="85" y2="57" stroke="white" stroke-width="4"/>
    <line x1="15" y1="78" x2="85" y2="78" stroke="white" stroke-width="4"/>
    <rect x="42" y="78" width="16" height="12" fill="white"/>
  </symbol>
  <symbol id="ic-shop" viewBox="0 0 100 100">
    <path d="M10 38 L50 15 L90 38 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <rect x="18" y="38" width="64" height="52" fill="none" stroke="white" stroke-width="6"/>
    <rect x="42" y="62" width="16" height="28" fill="none" stroke="white" stroke-width="5"/>
    <rect x="22" y="50" width="14" height="10" fill="white"/>
    <rect x="64" y="50" width="14" height="10" fill="white"/>
  </symbol>
</svg>

<div id="app">
  <header class="topbar">
    <div class="brand" onclick="showView('home')" style="cursor:pointer;" title="Go to home page">🏠 <span>Places<b>4</b>Lease</span></div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="openReportModal()" style="display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface);cursor:pointer;" title="Report a scam or concern">📢 <span>Report</span></button>
      <button class="icon-btn" onclick="toggleSearch()">🔍</button>
      <nav class="desktop-nav">
        <button onclick="showView('saved')">🔑 Saved</button>
        <button class="btn-brass" style="border-radius:10px;" onclick="handlePostTap()">➕ Upload Property</button>
        <button onclick="showView('dashboard')">📋 Dashboard</button>
        <button onclick="showView('profile')">👤 Profile</button>
      </nav>
    </div>
  </header>

  <div class="search-row hidden" id="searchRow">
    <input type="text" id="searchInput" placeholder="Search community, district or county..." oninput="onSearch(this.value)">
    <div class="price-row">
      <input type="number" id="minPriceInput" class="field-input" placeholder="Min $" oninput="onPriceFilter()">
      <input type="number" id="maxPriceInput" class="field-input" placeholder="Max $" oninput="onPriceFilter()">
      <button class="btn btn-outline" style="flex:0 0 auto;padding:9px 14px;font-size:13px;" onclick="resetFilters()">↺ Reset</button>
    </div>
  </div>

  <div class="chip-row" id="typeChips"></div>

  <div class="view-controls">
    <div class="seg-toggle" id="viewToggle">
      <button class="seg active" data-mode="list" onclick="setMode('list')">☰ List</button>
      <button class="seg" data-mode="map" onclick="setMode('map')">🗺️ Map</button>
    </div>
    <select id="sortSelect" onchange="onSort(this.value)">
      <option value="newest">Newest</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
    </select>
  </div>

  <main id="view-home" class="view active">
    <section id="listGrid" class="grid"></section>
    <section id="mapSection" class="map-view hidden"><div id="leafletMap" style="width:100%;height:100%;"></div></section>
  </main>

  <main id="view-saved" class="view">
    <h2 class="section-title">Saved listings</h2>
    <section id="savedGrid" class="grid"></section>
  </main>

  <main id="view-dashboard" class="view">
    <h2 class="section-title">My listings</h2>
    <section id="dashGrid"></section>
  </main>

  <main id="view-profile" class="view"></main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-view="home" onclick="showView('home')">🏠<span>Home</span></button>
    <button class="nav-item" data-view="saved" onclick="showView('saved')">🔑<span>Saved</span></button>
    <button class="nav-item nav-post" onclick="handlePostTap()">➕</button>
    <button class="nav-item" data-view="dashboard" onclick="showView('dashboard')">📋<span>Listings</span></button>
    <button class="nav-item" data-view="profile" onclick="showView('profile')">👤<span>Profile</span></button>
  </nav>

  <div class="modal-overlay hidden" id="detailModal" onclick="if(event.target===this)closeModal('detailModal')">
    <div class="modal-sheet" id="detailSheet"></div>
  </div>
  <div class="modal-overlay hidden" id="regModal" onclick="if(event.target===this)closeModal('regModal')">
    <div class="modal-sheet" id="regSheet"></div>
  </div>
  <div class="modal-overlay hidden" id="listingModal" onclick="if(event.target===this)closeModal('listingModal')">
    <div class="modal-sheet" id="listingSheet"></div>
  </div>
  <div class="modal-overlay hidden" id="safetyModal" onclick="if(event.target===this)closeModal('safetyModal')">
    <div class="modal-sheet" id="safetySheet">
      <button class="modal-close" onclick="closeModal('safetyModal')">✕</button>
      <h2 style="margin-bottom:14px;">Safety &amp; Terms</h2>
      <div id="disclaimerText" style="font-size:13.5px;line-height:1.6;color:#3a3a36;"></div>
    </div>
  </div>

function initLeafletMap(){
  if(leafletMap){
    leafletMap.invalidateSize();
    return;
  }
  leafletMap = L.map('leafletMap', { zoomControl:true }).setView(LIBERIA_CENTER, LIBERIA_ZOOM);

    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'
  }).addTo(leafletMap);
}
function renderMap(){
  if(!leafletMap) return;

  leafletMarkers.forEach(m=>m.remove());

  const list = filtered();
  const withCoords = list.filter(item=>item.lat && item.lng);
  if(withCoords.length===0){
    // No GPS listings yet — show a note but keep the map of Liberia visible
    leafletMap.setView(LIBERIA_CENTER, LIBERIA_ZOOM);
    return;
  }
  withCoords.forEach(item=>{
    const icon = L.divIcon({
      className:'',
      html:`<div style="background:${item.premium?'#B8862E':'#1C2E29'};color:#fff;font-size:11px;font-weight:700;padding:5px 9px;border-radius:8px 8px 8px 2px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;">$${item.price}</div>`,
      iconAnchor:[0,28]
    });

      .addTo(leafletMap)
      .bindPopup(`
        <div style="font-family:system-ui,sans-serif;min-width:180px;">

            View listing →
          </a>
        </div>`, {maxWidth:220});
    leafletMarkers.push(marker);
  });
  // Fit map to show all visible markers
  const group = L.featureGroup(leafletMarkers);
  leafletMap.fitBounds(group.getBounds().pad(0.15));
}
function closePopups(){
  leafletMarkers.forEach(m=>m.closePopup());

function filtered(){
  let arr = DATA.filter(d=>
    (activeType==='All'||d.rental_type===activeType) &&
    (minPrice===null||d.price>=minPrice) &&
    (maxPrice===null||d.price<=maxPrice) &&
    (d.community.toLowerCase().includes(searchTerm)||d.district.toLowerCase().includes(searchTerm)||d.county.toLowerCase().includes(searchTerm))
  );
  if(sortMode==='price-asc') arr.sort((a,b)=> (b.premium-a.premium) || (a.price-b.price));
  else if(sortMode==='price-desc') arr.sort((a,b)=> (b.premium-a.premium) || (b.price-a.price));
  else arr.sort((a,b)=> (b.premium-a.premium) || (b.id-a.id));
  return arr;
}

async function toggleSave(id){
  const nowSaving = !saved.has(id);
  if(seekerAccount){
    if(nowSaving){
      const { error } = await db.from('saved_listings').insert({ seeker_id: seekerAccount.id, listing_id: id });
      if(error){ showToast('Could not save — please try again'); return; }
    } else {
      await db.from('saved_listings').delete().eq('seeker_id', seekerAccount.id).eq('listing_id', id);
    }
  }
  if(nowSaving) saved.add(id); else saved.delete(id);
  renderHome(); renderSaved();
  showToast(nowSaving ? '🔑 Saved' : 'Removed from saved');
  const icon = document.getElementById('detailSaveIcon');
  if(icon && Number(icon.dataset.id)===id) icon.classList.toggle('saved', saved.has(id));
}

async function confirmDeleteListing(id){
  if(!confirm('Delete this listing? This cannot be undone.')) return;
  // Optimistic: remove from the screen immediately (no re-fetch, so the
  // network delete completing later can't silently undo this)
  const removed = myListings.find(d=>d.id===id);
  myListings = myListings.filter(d=>d.id!==id);
  renderDashboardHTML();
  const { error } = await db.from('listings').delete().eq('id', id);
  if(error){
    if(removed) myListings.push(removed);
    renderDashboardHTML();
    showToast('Could not delete — please try again');
    return;
  }
  await loadListings(); renderHome();
  showToast('Listing deleted');
}
async function toggleAvailable(id){
  const item = myListings.find(d=>d.id===id);
  if(!item) return;
  const previous = item.available;
  item.available = !previous;
  const switchEl = el('availSwitch_'+id);
  if(switchEl) switchEl.classList.toggle('on', item.available);
  renderDashboardHTML();
  const { error } = await db.from('listings').update({ available: item.available }).eq('id', id);
  if(error){
    item.available = previous;
    renderDashboardHTML();
    showToast('Could not update — please try again');
    return;
  }
  await loadListings(); renderHome();
  showToast(item.available ? 'Listing is active and visible again' : 'Listing hidden from public view');
}

async function createAccount(){

  // existing anonymous identity in place — same user, same data, but now
  // recoverable on any device via a real login instead of being stuck to
  // this one browser).
  const { error: credError } = await db.auth.updateUser({ email: regData.email, password: regData.password });
  if(credError){
    if(credError.message && credError.message.toLowerCase().includes('already')){
      showToast('That email is already registered — please log in instead.');
    } else {
      showToast('Could not set up your login: ' + credError.message);
    }
    return;
  }
  const { data, error } = await db.from('landlords').insert({
    id: currentUserId,
    name: regData.name, sex: regData.sex, country: regData.country, county: regData.county,
    whatsapp: regData.whatsapp, email: regData.email,
    marketing_opt_in: regData.marketingOptIn, agreed_terms: true
  }).select().single();
  if(error){
    showToast('Could not create account — please check your connection and try again');
    console.error(error);
    return;
  }
  landlordAccount = data;
  closeModal('regModal');
  showToast('🎉 Account created! Now add your first listing.');
  // Welcome email to the new landlord
  sendEmail(
    regData.email, regData.name,
    'Welcome to Places4Lease — your landlord account is ready',
    `<h2 style="color:#B8862E;">Welcome, ${regData.name}!</h2>
     <p>Your landlord account on Places4Lease is confirmed. You can now list your properties for free and connect directly with renters across Liberia.</p>
     <p><strong>Your registered WhatsApp:</strong> ${regData.whatsapp}<br>
        <strong>Renters will contact you at this number</strong> — make sure WhatsApp is active on it.</p>
     <p><a href="https://places4lease.com" style="background:#B8862E;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700;">Post your first listing →</a></p>
     <p style="color:#7A7167;font-size:12px;">Places4Lease is completely free to list on. If you have any questions, contact us at ${SITE_CONTACT.email} or call ${SITE_CONTACT.phone1}.</p>`
  );
  // Notify admin of new landlord registration
  sendEmail(
    ADMIN_EMAIL, 'Places4Lease Admin',
    `New landlord registered: ${regData.name}`,
    `<h2 style="color:#B8862E;">New landlord registration</h2>
     <p><strong>Name:</strong> ${regData.name}</p>
     <p><strong>County:</strong> ${regData.county}</p>
     <p><strong>WhatsApp:</strong> ${regData.whatsapp}</p>
     <p><strong>Email:</strong> ${regData.email}</p>
     <p><strong>WhatsApp confirmation:</strong> ${regData.waConfirmed === 'sent' ? '📨 Message sent (pending review)' : '—'}</p>
     <p style="color:#7A7167;font-size:12px;">Log in to the admin portal to review and verify this landlord.</p>`
  );
  openListingFlow();
}

/* ---------------- listing flow ---------------- */
function openListingFlow(){
  listingStep = 1;
  editingListingId = null;
  listingData = {county:'',district:'',community:'',ownerContact:(landlordAccount.whatsapp||'').replace(/\D/g,''),lat:null,lng:null,rentalType:'Residential',rooms:1,restrooms:1,sittingRooms:0,kitchens:0,officeSpaces:0,conferenceRooms:0,price:'',freq:'6 months',amenities:[],photoSlots:{},available:true};
  renderListingStep();
  el('listingModal').classList.remove('hidden');
}
function editListing(id){
  const item = myListings.find(d=>d.id===id);
  if(!item){ showToast('Could not find that listing'); return; }
  editingListingId = id;
  listingStep = 1;
  // Best-effort mapping of existing photo URLs back onto slots, in the
  // same order they were originally uploaded (front/main first, then
  // the rest) — existing photos are kept as URL strings unless the
  // landlord chooses to replace them with a new file.
  const photoSlots = {};
  const mainSlotKey = PHOTO_SLOTS.find(s=>s.main)?.key;
  if(mainSlotKey && item.main_photo_url) photoSlots[mainSlotKey] = item.main_photo_url;
  const others = (item.photo_urls||[]).filter(u=>u!==item.main_photo_url);
  const otherSlotKeys = PHOTO_SLOTS.filter(s=>!s.main).map(s=>s.key);
  others.forEach((url,i)=>{ if(otherSlotKeys[i]) photoSlots[otherSlotKeys[i]] = url; });
  listingData = {
    county:item.county, district:item.district, community:item.community,
    ownerContact:item.owner_contact, lat:item.lat, lng:item.lng,
    rentalType:item.rental_type, rooms:item.rooms, restrooms:item.restrooms,
    sittingRooms:item.sitting_rooms||0, kitchens:item.kitchens||0,
    officeSpaces:item.office_spaces||0, conferenceRooms:item.conference_rooms||0,
    price:String(item.price), freq:item.payment_frequency,
    amenities:[...(item.amenities||[])], photoSlots, available:item.available
  };
  renderListingStep();
  el('listingModal').classList.remove('hidden');
}
function saveCurrentStepFields(){
  // Snapshot whatever the user has typed so a re-render doesn't blank the form
  if(listingStep===1){
    const c=el('lCounty'); if(c) listingData.county=c.value;
    const d=el('lDistrict'); if(d) listingData.district=d.value.trim();
    const co=el('lCommunity'); if(co) listingData.community=co.value.trim();
    const oc=el('lOwnerContact'); if(oc) listingData.ownerContact=oc.value.trim().replace(/\D/g,'');
  } else if(listingStep===3){
    const p=el('lPrice'); if(p) listingData.price=p.value.trim();
  }
}
function useMyLocation(){
  saveCurrentStepFields();   // capture typed values BEFORE the async callback fires
  showToast('Getting your location…');
  const fallback = ()=>{
    listingData.lat = 6.3156 + (Math.random()-0.5)*0.4;
    listingData.lng = -10.8074 + (Math.random()-0.5)*0.4;
    renderListingStep();
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{ listingData.lat=pos.coords.latitude; listingData.lng=pos.coords.longitude; renderListingStep(); },
      ()=>fallback(),
      {timeout:4000}
    );
  } else fallback();
}
function renderListingStep(){
  const total = 6;
  let body = '';
  if(listingStep===1){
    body = `
      <div class="field-label">County</div>
      <select class="field-input" id="lCounty">
        <option value="">Select a county</option>
        ${COUNTIES.map(c=>`<option value="${c}" ${listingData.county===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <div class="field-label">Political district</div>
      <input class="field-input" id="lDistrict" value="${listingData.district}" placeholder="e.g. District #4">
      <div class="field-label">Community name</div>
      <input class="field-input" id="lCommunity" value="${listingData.community}" placeholder="e.g. Sinkor">
      <div class="field-label">Owner's contact number</div>
      <input class="field-input" id="lOwnerContact" value="${listingData.ownerContact}" placeholder="+231 ...">
      <div class="field-hint">Defaults to your number — change it if you are listing on behalf of someone else.</div>
      <div class="field-label">Property location (GPS)</div>
      <div class="loc-box">
        ${listingData.lat ? `<div class="verify-ok">📍 Location captured (${listingData.lat.toFixed(4)}, ${listingData.lng.toFixed(4)})</div>` :
          `<button class="btn btn-brass" style="display:inline-block;padding:10px 20px;" onclick="useMyLocation()">📍 Use my current location</button>
           <div class="field-hint">Optional, but it helps renters find the exact property on the map.</div>`}
      </div>`;
  } else if(listingStep===2){
    body = `
      <div class="field-label">Rental type</div>
      <div class="opt-row three">
        ${RENTAL_TYPES.map(t=>`<button class="opt-btn ${listingData.rentalType===t?'active':''}" onclick="listingData.rentalType='${t}';renderListingStep();">${t}</button>`).join('')}
      </div>`;
  } else if(listingStep===3){
    body = `
      <div class="counter-grid">
        <div class="counter-col">
          <div class="field-label">Number of rooms</div>
          <div class="stepper">
            <button onclick="listingData.rooms=Math.max(1,listingData.rooms-1);renderListingStep();">−</button>
            <span class="val">${listingData.rooms}</span>
            <button onclick="listingData.rooms++;renderListingStep();">+</button>
          </div>
          <div class="field-label">Number of restrooms</div>
          <div class="stepper">
            <button onclick="listingData.restrooms=Math.max(1,listingData.restrooms-1);renderListingStep();">−</button>
            <span class="val">${listingData.restrooms}</span>
            <button onclick="listingData.restrooms++;renderListingStep();">+</button>
          </div>
          <div class="field-label">Number of sitting/living rooms</div>
          <div class="stepper">
            <button onclick="listingData.sittingRooms=Math.max(0,listingData.sittingRooms-1);renderListingStep();">−</button>
            <span class="val">${listingData.sittingRooms}</span>
            <button onclick="listingData.sittingRooms++;renderListingStep();">+</button>
          </div>
        </div>
        <div class="counter-col">
          <div class="field-label">Number of kitchens</div>
          <div class="stepper">
            <button onclick="listingData.kitchens=Math.max(0,listingData.kitchens-1);renderListingStep();">−</button>
            <span class="val">${listingData.kitchens}</span>
            <button onclick="listingData.kitchens++;renderListingStep();">+</button>
          </div>
          <div class="field-label">Number of office spaces</div>
          <div class="stepper">
            <button onclick="listingData.officeSpaces=Math.max(0,listingData.officeSpaces-1);renderListingStep();">−</button>
            <span class="val">${listingData.officeSpaces}</span>
            <button onclick="listingData.officeSpaces++;renderListingStep();">+</button>
          </div>
          <div class="field-label">Number of conference rooms</div>
          <div class="stepper">
            <button onclick="listingData.conferenceRooms=Math.max(0,listingData.conferenceRooms-1);renderListingStep();">−</button>
            <span class="val">${listingData.conferenceRooms}</span>
            <button onclick="listingData.conferenceRooms++;renderListingStep();">+</button>
          </div>
        </div>
      </div>
      <div class="field-label" style="margin-top:16px;">Rental price (USD)</div>
      <input class="field-input" id="lPrice" type="number" value="${listingData.price}" placeholder="e.g. 350" oninput="listingData.price=this.value">
      <div class="field-label">Rental payment frequency</div>
      <div class="opt-row three">
        ${PAY_FREQ.map(f=>`<button class="opt-btn ${listingData.freq===f?'active':''}" onclick="listingData.freq='${f}';renderListingStep();">${f}</button>`).join('')}
      </div>`;
  } else if(listingStep===4){
    body = `
      ${AMENITY_GROUPS.map(g=>`
        <div class="field-label" style="margin-top:16px;">${g.title}</div>
        <div class="amenity-grid">
          ${g.keys.map(k=>`<button class="opt-btn ${listingData.amenities.includes(k)?'active':''}" onclick="toggleAmenity('${k}')">${AMENITIES[k]}</button>`).join('')}
        </div>`).join('')}`;
  } else if(listingStep===5){
    body = `
      <p style="font-size:13px;color:var(--muted);margin:0 0 4px;">All photos are compressed automatically and stored permanently with your listing. Visitors can browse every photo you upload using the arrows in the listing gallery.</p>
      <div class="photo-slot-grid">
        ${PHOTO_SLOTS.map(s=>{
          const f = listingData.photoSlots[s.key];
          const previewSrc = f ? (typeof f === 'string' ? f : URL.createObjectURL(f)) : null;
          return `<div class="photo-slot" style="${s.main?'border-color:var(--brass);background:#FBF3E4;':''}">
            ${previewSrc ? `<img src="${previewSrc}">` : `<div class="ph-placeholder">📷</div>`}
            <div class="ph-label">${s.label}${s.main?`<br><span style="color:var(--brass-dark);font-weight:700;font-size:11px;">⭐ Main photo — required</span>`:'<br><span style="color:var(--muted);font-size:11px;">Optional</span>'}</div>
            <input type="file" accept="image/*" id="slot_${s.key}" style="display:none" onchange="onSlotChosen('${s.key}',this)">
            <div style="display:flex;gap:6px;justify-content:center;">
              <button class="slot-btn" onclick="document.getElementById('slot_${s.key}').click()">${f?'Change':'Add photo'}</button>
              ${(f && !s.main) ? `<button class="slot-btn" style="color:var(--red);" onclick="removeSlotPhoto('${s.key}')">Remove</button>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } else if(listingStep===6){
    const a = listingData.amenities.map(k=>AMENITIES[k]).join(', ') || '—';
    const photoCount = Object.values(listingData.photoSlots).filter(Boolean).length;
    body = `
      <div class="summary-row"><span>Location</span><span>${listingData.community}, ${listingData.district}, ${listingData.county} County</span></div>
      <div class="summary-row"><span>GPS</span><span>${listingData.lat?listingData.lat.toFixed(4)+', '+listingData.lng.toFixed(4):'Not captured'}</span></div>
      <div class="summary-row"><span>Owner contact</span><span>${listingData.ownerContact}</span></div>
      <div class="summary-row"><span>Rental type</span><span>${listingData.rentalType}</span></div>
      <div class="summary-row"><span>Rooms / Restrooms</span><span>${listingData.rooms} / ${listingData.restrooms}</span></div>
      <div class="summary-row"><span>Sitting rooms / Kitchens</span><span>${listingData.sittingRooms} / ${listingData.kitchens}</span></div>
      <div class="summary-row"><span>Office spaces / Conference rooms</span><span>${listingData.officeSpaces} / ${listingData.conferenceRooms}</span></div>
      <div class="summary-row"><span>Price</span><span>$${listingData.price||'0'} / ${listingData.freq}</span></div>
      <div class="summary-row"><span>Amenities</span><span>${a}</span></div>
      <div class="summary-row"><span>Photos</span><span>${photoCount} of 5 (all will be uploaded)</span></div>
      <div class="dash-toggle-row" style="margin-top:14px;">
        <span>Is this property still available?</span>
        <button class="switch ${listingData.available?'on':''}" onclick="listingData.available=!listingData.available;renderListingStep();"></button>
      </div>
      <div class="field-hint" style="margin-top:10px;">⚠️ By publishing you confirm this listing follows our <a class="safety-link" href="#" onclick="openSafety();return false;">Safety &amp; Terms</a>.</div>`;
  }
  el('listingSheet').innerHTML = `
    <button class="modal-close" onclick="closeModal('listingModal')">✕</button>
    <div class="step-indicator">Upload Property · Step ${listingStep} of ${total}</div>
    <div class="step-title">${['Location, contact &amp; GPS','Rental type','Rooms, price &amp; terms','Amenities','Photos','Review &amp; publish'][listingStep-1]}</div>
    ${body}
    <div class="step-nav">
      ${listingStep>1?`<button class="btn btn-ghost" style="flex:0 0 auto;" onclick="changeListingStep(-1)">← Back</button>`:''}
      ${listingStep<total?`<button class="btn btn-brass" onclick="changeListingStep(1)">Continue →</button>`:`<button class="btn btn-whatsapp" onclick="publishListing()">${editingListingId?'💾 Save changes':'🎉 Publish listing'}</button>`}
    </div>`;
}
function toggleAmenity(k){
  const i = listingData.amenities.indexOf(k);
  if(i>-1) listingData.amenities.splice(i,1); else listingData.amenities.push(k);
  renderListingStep();
}
function onSlotChosen(key, input){
  if(input.files[0]){ listingData.photoSlots[key] = input.files[0]; renderListingStep(); }
}
function removeSlotPhoto(key){
  delete listingData.photoSlots[key];
  renderListingStep();
}
function changeListingStep(dir){
  if(dir>0){
    if(listingStep===1){
      listingData.county = el('lCounty').value;
      listingData.district = el('lDistrict').value.trim();
      listingData.community = el('lCommunity').value.trim();
      listingData.ownerContact = el('lOwnerContact').value.trim().replace(/\D/g,'');
      if(!listingData.county || !listingData.district || !listingData.community || !listingData.ownerContact){
        showToast('Please complete county, district, community and owner contact'); return;
      }
    }
    if(listingStep===3){
      listingData.price = el('lPrice').value.trim();
      if(!listingData.price){ showToast('Please enter a rental price'); return; }
    }
    if(listingStep===5){
      const mainSlot = PHOTO_SLOTS.find(s=>s.main);
      if(mainSlot && !listingData.photoSlots[mainSlot.key]){
        showToast('Please add the front-of-building photo before continuing — it is required'); return;
      }
    }
  }
  listingStep += dir;
  renderListingStep();
}
/* ---------------- photo upload ---------------- */
async function uploadPhoto(file, path){
  if(!file) return null;
  try {
    const { error } = await db.storage.from('listing-photos').upload(path, file, { upsert:true });
    if(error){
      console.error('Upload error:', error.message);
      showToast('⚠️ A photo could not be uploaded: '+error.message);
      return null;
    }
    const { data } = db.storage.from('listing-photos').getPublicUrl(path);
    return data.publicUrl;
  } catch(e){
    console.error('Upload exception:', e);
    showToast('⚠️ A photo could not be uploaded — please check your connection');
    return null;
  }
}

async function publishListing(){
  showToast(editingListingId ? 'Saving changes…' : 'Uploading photos and publishing…');

  // For each slot: a File means a new upload; a string means an existing
  // photo URL that's being kept unchanged (only relevant when editing).
  const slots = PHOTO_SLOTS.map(s=>s.key);
  const resolved = await Promise.all(slots.map(key=>{
    const val = listingData.photoSlots[key];
    if(!val) return Promise.resolve(null);
    if(typeof val === 'string') return Promise.resolve(val); // unchanged existing photo
    const ext = val.name.split('.').pop() || 'jpg';
    const path = `${currentUserId}-${Date.now()}-${key}.${ext}`;
    return uploadPhoto(val, path);
  }));

  const frontIdx = PHOTO_SLOTS.findIndex(s=>s.main);
  const mainPhotoUrl = resolved[frontIdx] || resolved.find(u=>u) || null;
  const photoUrls = resolved.filter(Boolean);

  const payload = {
    rental_type: listingData.rentalType,
    county: listingData.county, district: listingData.district, community: listingData.community,
    owner_contact: listingData.ownerContact,
    rooms: listingData.rooms, restrooms: listingData.restrooms,
    sitting_rooms: listingData.sittingRooms, kitchens: listingData.kitchens,
    office_spaces: listingData.officeSpaces, conference_rooms: listingData.conferenceRooms,
    price: Number(listingData.price)||0, payment_frequency: listingData.freq,
    amenities: listingData.amenities, available: listingData.available,
    lat: listingData.lat, lng: listingData.lng,
    main_photo_url: mainPhotoUrl,
    photo_urls: photoUrls
  };

  let error;
  if(editingListingId){
    ({ error } = await db.from('listings').update(payload).eq('id', editingListingId));
  } else {
    ({ error } = await db.from('listings').insert({ landlord_id: currentUserId, ...payload }).select().single());
  }

  if(error){
    showToast('Could not save — please check your connection and try again');
    console.error(error);
    return;
  }
  const wasEditing = !!editingListingId;
  editingListingId = null;
  closeModal('listingModal');
  await loadListings();
  if(wasEditing) await loadMyListings();
  await showView(wasEditing ? 'dashboard' : 'home');
  showToast(wasEditing ? '✅ Listing updated!' : '🎉 Listing published!');
  // Confirmation email to the landlord
  if(landlordAccount && landlordAccount.email){
    sendEmail(
      landlordAccount.email, landlordAccount.name,
      'Your listing is live on Places4Lease',
      `<h2 style="color:#B8862E;">Your listing is live!</h2>
       <p>Your <strong>${listingData.rentalType}</strong> in <strong>${listingData.community}, ${listingData.county} County</strong> is now visible to renters across Liberia.</p>
       <p><strong>Price:</strong> $${listingData.price}/month</p>
       <p>Renters will contact you directly on WhatsApp at <strong>${landlordAccount.whatsapp}</strong>. Make sure that number is active.</p>
       <p><a href="https://places4lease.com" style="background:#B8862E;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700;">View your listing →</a></p>
       <p style="color:#7A7167;font-size:12px;">You can mark your property as unavailable any time from your dashboard. Questions? Contact us at ${SITE_CONTACT.email}.</p>`
    );
  }
}

/* ---------------- data loading ---------------- */
async function loadListings(){
  const { data, error } = await db.from('listings').select('*').eq('available', true).order('id', {ascending:false});
  if(error){ console.error(error); DATA = []; return; }
  const colors = ['#1C6B5A','#B8862E','#3E7CB1','#A8553E','#6A5A9C','#5A7A4A'];
  DATA = (data||[]).map((d,i)=>({...d, color: colors[i % colors.length]}));
}
async function loadLandlordAccount(){
  const { data } = await db.from('landlords').select('*').eq('id', currentUserId).maybeSingle();
  landlordAccount = data || null;
}
async function loadSeekerAccount(){
  const { data } = await db.from('seekers').select('*').eq('id', currentUserId).maybeSingle();
  seekerAccount = data || null;
}

/* ---------------- init ---------------- */
async function init(){
  await ensureAuth();
  await loadLandlordAccount();
  await loadSeekerAccount();
  await loadSavedListings();
  await loadListings();
  el('loadingOverlay').classList.add('hidden');
  renderChips();
  renderHome();
}
init();
</script>
